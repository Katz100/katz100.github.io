<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Sign Up Page </title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>
        <div id="content">
                <h1> Sign Up </h1>
                <hr>
                <form id="signupForm" action="welcome.html">
                        <div class="form-row">
                                <label>Name:</label>
                                <input type="text" name="fName">
                        </div>

                        <div class="form-row">
                                <label>Last Name:</label>
                                <input type="text" name="lName">
                        </div>

                        <div class="form-row">
                                <label>Gender:</label>
                                <input type="radio" name="gender" value="m"><span class="radio-option">Male</span>
                                <input type="radio" name="gender" value="f">Female
                        </div>

                        <div class="form-row">
                                <label>Zip Code:</label>
                                <input type="text" id="zip" name="zip"><br>
                        </div>

                        City: <span id="city"></span> <br>
                        Latitude: <span id="lat"></span> <br>
                        Longitude: <span id="long"></span> <br><br>

                        <div class="form-row">
                                <label>State:</label>
                                <select id="state" name="state">
                                        <option>Select One</option>
                                </select>
                        </div>


                        <div class="form-row">
                        <label>Select a County:</label> 
                        <select id="county" name="county"></select>
                        </div>


                        <div class="form-row">
                        <label>Desired Username:</label>
                        <input type="text" id="username" name="username">
                        </div>
                        <span id="usernameError"></span><br>


                        <div class="form-row">
                        <label>Password:</label> <input id="password" type="password" name="password">
                        <span id="suggestedPwd"></span>
                        </div>

                        <div class="form-row">
                        <label>Type Password Again:</label> <input id="passwordAgain" type="password">
                        </div>

                        <span id="passwordError"></span><br>

                        <input type="submit" value="Sign up!">
                </form>

        </div>
        <hr>
        <script src="js/script.js"></script>
</body>

</html>
