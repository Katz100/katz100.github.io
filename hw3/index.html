<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <h1 class="p-5 bg-info display-1">Weather Forecast</h1>

    <div class="container py-5">
        <div class="card">
            <div class="card-body">
                <h2 class="display-6 mb-3">Please enter a location to see current weather data</h2>
                <form id="locationForm" class="row g-3 needs-validation" novalidate>
                    <div class="col-12">
                        <label for="locationTxt" class="form-label">Location</label>
                        <input id="locationTxt" type="text" title="locationInput" class="form-control form-control-lg"
                            placeholder="Enter the name of a city" name="location" required>
                        <div class="invalid-feedback">Please enter a valid location</div>
                        <div id="locationInfo" class="form-text">Weather info will be displayed upon submitting</div>
                    </div>
                    <input class="btn btn-primary col-12" type="submit" title="submitBtn" value="Get Weather Info">
                </form>

                <div id="weatherResult" class="mt-4 d-none">
                    <div class="card border-primary">
                        <img id="weatherImg" src="img/hot.jpg" class="rounded mx-auto d-block" alt="Weather">
                        <div class="card-body">
                        <h5 id="cityName" class="card-title">El Dorado Hills</h2>
                        <p id="temp" class="display-6">23</p>
                        <p id="wind" class="display-6">23</p>
                        <h5 id ="infoTxt"></h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <div class="text-center">
                <p>CST336 Internet Programming. 2026&copy; Hopkins</p>
            </div>
        </footer>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
